name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'maven'
      - run: mvn -B package
      - run: mvn -B jpackage:jpackage
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v1
        with:
          name: ESP Flasher v${{ steps.version.outputs.VERSION }}
          files: target/dist/*.dmg
          body: |
            ## ESP Flasher v${{ steps.version.outputs.VERSION }}
            ### Downloads
            - **Mac**: ESP-Flasher.dmg
            - **Windows**: ESP-Flasher.msi
            ### Note
            Unsigned build — if blocked on Mac:
            `xattr -cr "/Applications/ESP Flasher (Beta).app"`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'maven'
      - run: mvn -B package
      # The `windows` Maven profile in pom.xml auto-activates on Windows and
      # already sets jpackage.type=MSI, so no extra -D flag is needed here.
      # (Passing -Djpackage.type=MSI on PowerShell breaks argument parsing.)
      - run: mvn -B jpackage:jpackage
      - name: Get version
        id: version
        run: echo "VERSION=$($env:GITHUB_REF -replace 'refs/tags/v','')" >> $env:GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v1
        with:
          files: target/dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
